name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate-bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run CI checks
        run: npm run ci